name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run Linter (Ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run mypy (strict)
        run: mypy --strict --ignore-missing-imports custom_components/wiener_linien_austria
      - name: Run tests
        run: pytest tests/ -v

  validate-card:
    # Rebuilds both Lovelace card bundles from src/ and verifies each
    # output is valid JS. Catches TS errors and missing deps before they
    # reach the served www/*.js.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install card deps
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build card bundles
        run: npm run build
      - name: Syntax-check modern bundle
        run: node -c custom_components/wiener_linien_austria/www/wiener-linien-austria-card.js
      - name: Syntax-check retro bundle
        run: node -c custom_components/wiener_linien_austria/www/wiener-linien-austria-retro-card.js
