rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not provide any service actions.
  appropriate-polling:
    status: done
  brands:
    status: done
    comment: Icons shipped in custom_components/wiener_linien_austria/brand/ (icon.png 256x256, icon@2x.png 512x512). HA 2026.3+ reads this locally; the home-assistant/brands repo no longer accepts custom-integration PRs.
  common-modules:
    status: done
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
  dependency-transparency:
    status: done
  docs-actions:
    status: exempt
    comment: No service actions.
  docs-high-level-description:
    status: done
  docs-installation-instructions:
    status: done
  docs-removal-instructions:
    status: done
  entity-event-setup:
    status: exempt
    comment: Coordinator pattern; entities don't subscribe to events directly.
  entity-unique-id:
    status: done
  has-entity-name:
    status: done
  runtime-data:
    status: done
  source-code-standards:
    status: done
  test-before-configure:
    status: done
  test-before-setup:
    status: done
  unique-config-entry:
    status: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No service actions.
  config-entry-unloading:
    status: done
  docs-configuration-parameters:
    status: done
  docs-installation-parameters:
    status: done
  entity-unavailable:
    status: done
    comment: CoordinatorEntity marks entities unavailable on coordinator failure.
  integration-owner:
    status: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator logs UpdateFailed warnings once and an info message on recovery.
  parallel-updates:
    status: done
  reauthentication-flow:
    status: exempt
    comment: TODO — flip if your API has long-lived credentials that can expire.
  test-coverage:
    status: done
    comment: Config flow (3 steps + reconfigure + search-again + abort reasons), coordinator (parse, rate-limit, cooldown, async_setup coord population, tram/bus fixture), sensor (MAX_DEPARTURES cap, alerts matching, availability), static catalogue loader (cache hit / corrupt / refresh-on-failure), alerts (_fetch_info_list error branches + line-fallback), and diagnostics are all covered.

  # Gold
  devices:
    status: done
    comment: DeviceInfo on entities + explicit dr.async_get_or_create in __init__.py.
  diagnostics:
    status: done
  discovery:
    status: exempt
    comment: Cloud/HTTP integration with no local discoverable component.
  discovery-update-info:
    status: exempt
    comment: No discovery.
  docs-data-update:
    status: done
  docs-examples:
    status: done
  docs-known-limitations:
    status: done
  docs-supported-devices:
    status: exempt
    comment: Cloud API; no physical devices. Flip to `todo` for device integrations.
  docs-supported-functions:
    status: done
  docs-troubleshooting:
    status: done
  docs-use-cases:
    status: done
  dynamic-devices:
    status: exempt
    comment: Single device per config entry; no runtime device discovery.
  entity-category:
    status: exempt
    comment: All entities are primary data. Flip if you add diagnostic/config entities.
  entity-device-class:
    status: done
    comment: Stop sensor uses SensorDeviceClass.DURATION with UnitOfTime.MINUTES.
  entity-disabled-by-default:
    status: exempt
    comment: No non-essential entities. Flip if you add rarely-used ones.
  entity-translations:
    status: done
  exception-translations:
    status: done
  icon-translations:
    status: done
  reconfiguration-flow:
    status: done
  repair-issues:
    status: done
    comment: Coordinator has raise/clear helpers; raise real issues when degraded conditions occur.
  stale-devices:
    status: exempt
    comment: See dynamic-devices.

  # Platinum
  async-dependency:
    status: done
    comment: Only aiohttp (async) used.
  inject-websession:
    status: done
    comment: async_get_clientsession(hass) in coordinator and config flow.
  strict-typing:
    status: done
    comment: py.typed marker present; CI runs mypy --strict.
