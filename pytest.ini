[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
# Coverage gate: 92% is the current floor. Bump up if you raise it.
addopts = --cov=custom_components/wiener_linien_austria --cov-fail-under=90
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:homeassistant.*
    ignore::DeprecationWarning:pytest_homeassistant_custom_component.*
    ignore::DeprecationWarning:aiohttp.*
