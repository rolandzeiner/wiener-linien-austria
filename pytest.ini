[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
# Coverage gate: 90% floor. Coverage source is configured in
# pyproject.toml [tool.coverage.run].
addopts = --cov --cov-fail-under=90
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:homeassistant.*
    ignore::DeprecationWarning:pytest_homeassistant_custom_component.*
    ignore::DeprecationWarning:aiohttp.*
